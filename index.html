<!DOCTYPE html>
<html>

<head>

<title>BLAST Prompt Generator</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


<h1>
🧬 BLAST Prompt Generator
</h1>


<div class="section">


<h2>BLAST Type</h2>


<label>Select BLAST Program:</label>


<select id="blastType">

<option value="blastn">blastn</option>

<option value="blastn-short">blastn-short</option>

<option value="blastp">blastp</option>

<option value="blastx">blastx</option>

<option value="tblastn">tblastn</option>

<option value="tblastx">tblastx</option>


</select>


</div>



<div class="section">


<h2>Query Files</h2>


<button onclick="setMultiple(false)">
Single FASTA File
</button>


<button onclick="setMultiple(true)">
Multiple FASTA Files
</button>


<div id="fileMode">
Select query type
</div>



<label>
Query FASTA Path:
</label>


<input 
id="queryPath"
placeholder="Example: D:\Queries\tRFs.fasta">



</div>




<div class="section">


<h2>BLAST Database</h2>


<label>
Database Path:
</label>


<input 
id="dbPath"
placeholder="Example: D:\Databases\tRNA_DB">



<button onclick="setDB(true)">
✓ Existing BLAST DB
</button>



<button onclick="setDB(false)">
＋ Create BLAST DB
</button>



<div id="dbMessage">
Select database status
</div>


</div>





<div class="section">


<h2>BLAST Parameters</h2>


<label>
E-value:
</label>

<input 
id="evalue"
value="1e-7">



<label>
Word Size:
</label>

<input 
id="wordsize"
value="7">



<label>
Percent Identity:
</label>

<input 
id="identity"
value="100">



<label>
Number of Threads:
</label>

<input 
id="threads"
value="8">



<label>
Output File:
</label>


<input
id="output"
value="blast_results.tsv">



</div>






<div class="section generate">


<button 
class="generateButton"
onclick="generate()">

🧬 Generate BLAST Command

</button>


<h2>
Generated Command
</h2>


<textarea id="result"></textarea>


</div>



</div>


<script src="script.js"></script>


</body>


</html>

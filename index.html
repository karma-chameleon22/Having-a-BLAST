<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>BLAST Prompt Generator</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


<h1>BLAST Prompt Generator</h1>

<p class="subtitle">
Generate custom BLAST commands with automated output formatting
</p>




<div class="section">

<h2>BLAST Program</h2>


<select id="blastType">

<option value="blastn">blastn</option>
<option value="blastn-short">blastn-short</option>
<option value="blastp">blastp</option>
<option value="blastx">blastx</option>
<option value="tblastn">tblastn</option>
<option value="tblastx">tblastx</option>

</select>

</div>







<div class="section">


<h2>Query Files</h2>


<button onclick="setMultiple(false)">
Single FASTA File
</button>


<button onclick="setMultiple(true)">
Multiple FASTA Files
</button>


<p id="fileMode">
No selection
</p>



<label>
Query FASTA Path
</label>


<input id="queryPath"
placeholder="C:\Queries\query.fasta">


</div>








<div class="section">


<h2>Database</h2>


<label>
BLAST Database Path
</label>


<input id="dbPath"
placeholder="C:\Database\my_database">


<button onclick="setDB(true)">
Existing Database
</button>


<button onclick="setDB(false)">
Create Database
</button>


<p id="dbMessage">
No selection
</p>


</div>








<div class="section">


<h2>BLAST Parameters</h2>


<label>
E-value
</label>

<input id="evalue" value="1e-7">


<label>
Word Size
</label>

<input id="wordsize" value="7">


<label>
Percent Identity
</label>

<input id="identity" value="100">


<label>
Threads
</label>

<input id="threads" value="8">


</div>









<div class="section">


<h2>Output Columns</h2>


<div class="checkbox-grid">


<label><input type="checkbox" value="qseqid" checked> Query ID</label>

<label><input type="checkbox" value="sseqid" checked> Subject ID</label>

<label><input type="checkbox" value="pident" checked> Percent Identity</label>

<label><input type="checkbox" value="length" checked> Alignment Length</label>

<label><input type="checkbox" value="mismatch"> Mismatches</label>

<label><input type="checkbox" value="gapopen"> Gap Opens</label>

<label><input type="checkbox" value="qstart"> Query Start</label>

<label><input type="checkbox" value="qend"> Query End</label>

<label><input type="checkbox" value="sstart"> Subject Start</label>

<label><input type="checkbox" value="send"> Subject End</label>

<label><input type="checkbox" value="evalue" checked> E-value</label>

<label><input type="checkbox" value="bitscore" checked> Bit Score</label>

<label><input type="checkbox" value="qseq"> Query Sequence</label>

<label><input type="checkbox" value="sseq"> Subject Sequence</label>

<label><input type="checkbox" value="qlen"> Query Length</label>

<label><input type="checkbox" value="slen"> Subject Length</label>

<label><input type="checkbox" value="qcovhsp"> Query Coverage</label>

<label><input type="checkbox" value="frames"> Frames</label>

<label><input type="checkbox" value="staxids"> Taxonomy ID</label>


</div>

</div>









<div class="section">


<h2>Output File</h2>


<select id="outputType">

<option value="tsv">TSV</option>

<option value="csv">CSV</option>

<option value="txt">TXT</option>

</select>



<label>
File Name
</label>


<input id="outputName"
value="blast_results">


</div>









<div class="section">


<button class="generateButton"
onclick="generate()">

Generate BLAST Command

</button>



<textarea id="result"
placeholder="Generated command will appear here">

</textarea>


</div>




</div>


<script src="script.js"></script>


</body>

</html>

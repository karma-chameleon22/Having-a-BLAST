<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>BLAST Prompt Generator</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


<h1>BLAST Prompt Generator</h1>

<p class="subtitle">
Generate customized BLAST commands with automatic output formatting
</p>




<div class="section">

<h2>BLAST Program</h2>

<select id="blastType">

<option value="blastn">blastn</option>
<option value="blastn-short">blastn-short</option>
<option value="blastp">blastp</option>
<option value="blastx">blastx</option>
<option value="tblastn">tblastn</option>
<option value="tblastx">tblastx</option>

</select>

</div>






<div class="section">

<h2>Query File</h2>


<button id="singleButton">
Single FASTA File
</button>


<button id="multipleButton">
Multiple FASTA Files
</button>


<p id="fileMode">
Select query type
</p>



<label>
Query Path
</label>

<input id="queryPath"
placeholder="C:\Queries\query.fasta">


</div>






<div class="section">

<h2>Database</h2>


<label>
Database Path
</label>


<input id="dbPath"
placeholder="C:\Database\myDB">


<button id="existingDB">
Existing BLAST Database
</button>


<button id="createDB">
Create BLAST Database
</button>


<p id="dbMessage">
Select database option
</p>


</div>







<div class="section">

<h2>Parameters</h2>


<label>
E-value
</label>

<input id="evalue" value="1e-7">


<label>
Word Size
</label>

<input id="wordsize" value="7">


<label>
Percent Identity
</label>

<input id="identity" value="100">


<label>
Threads
</label>

<input id="threads" value="8">


</div>








<div class="section">

<h2>BLAST Output Columns</h2>


<div class="checkbox-grid">


<label>
<input type="checkbox" value="qseqid" checked>
qseqid
</label>


<label>
<input type="checkbox" value="sseqid" checked>
sseqid
</label>


<label>
<input type="checkbox" value="pident" checked>
pident
</label>


<label>
<input type="checkbox" value="length" checked>
length
</label>


<label>
<input type="checkbox" value="mismatch">
mismatch
</label>


<label>
<input type="checkbox" value="gapopen">
gapopen
</label>


<label>
<input type="checkbox" value="qstart">
qstart
</label>


<label>
<input type="checkbox" value="qend">
qend
</label>


<label>
<input type="checkbox" value="sstart">
sstart
</label>


<label>
<input type="checkbox" value="send">
send
</label>


<label>
<input type="checkbox" value="evalue" checked>
evalue
</label>


<label>
<input type="checkbox" value="bitscore" checked>
bitscore
</label>


<label>
<input type="checkbox" value="qseq">
Query Sequence
</label>


<label>
<input type="checkbox" value="sseq">
Subject Sequence
</label>


<label>
<input type="checkbox" value="qlen">
Query Length
</label>


<label>
<input type="checkbox" value="slen">
Subject Length
</label>


<label>
<input type="checkbox" value="qcovhsp">
Query Coverage
</label>


<label>
<input type="checkbox" value="frames">
Frames
</label>


</div>

</div>









<div class="section">


<h2>Output File</h2>


<select id="outputType">

<option value="tsv">
TSV
</option>


<option value="csv">
CSV
</option>


<option value="txt">
TXT
</option>


</select>



<label>
File Name
</label>


<input id="outputName"
value="blast_results">


</div>








<div class="section">


<button 
id="generateButton"
class="generateButton">

Generate BLAST Command

</button>



<textarea id="result"
placeholder="BLAST command will appear here">

</textarea>


</div>





</div>



<script src="script.js" defer></script>


</body>

</html>
